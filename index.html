<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Leveler</title>
  
  <!-- PWA Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    body { font-family: 'VT323', monospace; letter-spacing: 0.05em; font-size: 1.25rem; }
    .pixel-border { border: 4px solid #333; box-shadow: 4px 4px 0px #000; }
    .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
    .glass-panel { background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(4px); }
    .floating-xp { animation: floatUp 1s ease-out forwards; }
    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
    .level-pulse { animation: pulse 0.5s infinite; }
    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 10px #a855f7; transform: scale(1); }
      50% { text-shadow: 0 0 20px #a855f7; transform: scale(1.1); }
    }
  </style>
</head>
<body class="relative min-h-screen text-[#e0e0e0] font-mono selection:bg-purple-500 flex flex-col items-center p-4 overflow-x-hidden">

  <!-- BACKGROUND IMAGE WITH OVERLAY -->
  <div class="fixed inset-0 z-[-1] bg-cover bg-center bg-no-repeat transition-all duration-700" style="background-image: url('https://i.pinimg.com/originals/ed/a5/73/eda5739966cb33768d8ad0d77d7307ce.gif')">
    <div class="absolute inset-0 bg-black/60"></div> 
  </div>

  <!-- HEADER / STATS -->
  <header class="w-full max-w-md mb-8 sticky top-0 pt-4 z-10">
    <div class="glass-panel p-4 pixel-border mb-2">
      <div class="flex justify-between items-start mb-4">
        <div class="flex flex-col">
          <span class="text-gray-400 text-sm uppercase tracking-widest">Player Profile</span>
          <h1 id="level-display" class="text-4xl font-bold text-white">
            LV. 0
          </h1>
        </div>
        <button onclick="openAddMenu()" class="pixel-border bg-purple-600 p-2 pixel-btn hover:bg-purple-500 flex items-center gap-2">
          <i data-lucide="plus" width="20" height="20"></i> <span class="hidden sm:inline font-bold">ADD</span>
        </button>
      </div>
      
      <div class="w-full h-6 bg-[#333]/50 pixel-border relative overflow-hidden mb-2">
        <div id="xp-bar" class="h-full bg-purple-500 transition-all duration-500 ease-out shadow-[0_0_15px_rgba(168,85,247,0.5)]" style="width: 0%"></div>
      </div>
      <div class="flex justify-between items-center text-gray-300 text-sm">
        <span id="base-xp-text">Base: 6 XP</span>
        <span id="xp-text" class="font-bold">0 / 12 XP</span>
      </div>
    </div>

    <div id="feedback-container"></div>
    <div id="level-up-container"></div>
  </header>

  <!-- ADD MENU MODAL -->
  <div id="add-menu-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-[#1e1e1e] pixel-border w-full max-w-sm p-6 relative">
      <button onclick="closeAddMenu()" class="absolute top-4 right-4 text-gray-500 hover:text-white">
        <i data-lucide="x" width="24" height="24"></i>
      </button>
      
      <h2 class="text-2xl font-bold mb-6 border-b border-gray-800 pb-2 uppercase tracking-widest text-purple-400">New Mission</h2>
      
      <div class="space-y-8">
        <form id="add-habit-form" onsubmit="handleAddHabit(event)" class="space-y-2">
          <label class="text-orange-400 flex items-center gap-2 text-sm uppercase font-bold">
            <i data-lucide="zap" width="16" height="16"></i> Daily Habit
          </label>
          <div class="flex gap-2">
            <input id="habit-input" placeholder="E.g. Exercise" required class="flex-grow bg-[#121212] pixel-border p-2 focus:outline-none focus:border-orange-500 text-white" />
            <button type="submit" class="bg-orange-600 p-2 pixel-border pixel-btn font-bold">ADD</button>
          </div>
        </form>

        <form id="add-todo-form" onsubmit="handleAddTodo(event)" class="space-y-2">
          <label class="text-blue-400 flex items-center gap-2 text-sm uppercase font-bold">
            <i data-lucide="list-todo" width="16" height="16"></i> Task
          </label>
          <div class="flex gap-2">
            <input id="todo-input" placeholder="E.g. Call client" required class="flex-grow bg-[#121212] pixel-border p-2 focus:outline-none focus:border-blue-500 text-white" />
            <button type="submit" class="bg-blue-600 p-2 pixel-border pixel-btn font-bold">ADD</button>
          </div>
          <label class="flex items-center gap-2 cursor-pointer group text-sm text-gray-400 mt-2">
            <input type="checkbox" id="todo-important" class="hidden peer" />
            <div class="w-5 h-5 pixel-border border-2 bg-gray-800 peer-checked:bg-yellow-500 flex items-center justify-center">
              <i data-lucide="star" width="12" height="12" class="text-white"></i>
            </div>
            High Priority (+50% XP)
          </label>
        </form>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="w-full max-w-md flex-grow mb-24 space-y-6">
    <!-- HABITS TAB -->
    <section id="habits-section" class="space-y-4 block">
      <div class="flex justify-between items-center border-b-4 border-orange-600/50 pb-2">
        <h2 class="text-2xl flex items-center gap-2 text-orange-400 font-bold drop-shadow-md">
          <i data-lucide="zap" width="22" height="22"></i> DAILY HABITS
        </h2>
      </div>
      <div id="habits-list" class="space-y-4"></div>
    </section>

    <!-- TODOS TAB -->
    <section id="todos-section" class="space-y-4 hidden">
      <div class="flex justify-between items-center border-b-4 border-blue-600/50 pb-2">
        <h2 class="text-2xl flex items-center gap-2 text-blue-400 font-bold drop-shadow-md">
          <i data-lucide="list-todo" width="22" height="22"></i> TO-DO LIST
        </h2>
      </div>
      <div class="glass-panel border-2 border-blue-600/50 p-2 text-[12px] text-center text-blue-300 uppercase tracking-widest mb-4 font-bold">
        SYSTEM: CLEARING ALL TASKS AT MIDNIGHT
      </div>
      <div id="todos-list" class="space-y-4"></div>
    </section>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 h-24 glass-panel border-t-4 border-[#333] flex items-center justify-around z-10 px-4">
    <button onclick="setTab('habits')" id="nav-habits" class="flex flex-col items-center gap-1 transition-all flex-1 py-2 text-orange-400 scale-110 drop-shadow-[0_0_8px_rgba(251,146,60,0.5)]">
      <i data-lucide="zap" width="32" height="32" fill="currentColor"></i>
      <span class="text-sm uppercase font-bold tracking-tighter">Habits</span>
    </button>
    <button onclick="setTab('todo')" id="nav-todos" class="flex flex-col items-center gap-1 transition-all flex-1 py-2 text-gray-500">
      <i data-lucide="list-todo" width="32" height="32"></i>
      <span class="text-sm uppercase font-bold tracking-tighter">To-Do</span>
    </button>
  </nav>

  <!-- QUICK STATS FOOTER -->
  <footer class="w-full max-w-md text-center text-gray-400 text-[12px] pb-28 flex justify-between px-4 uppercase font-bold tracking-widest drop-shadow-md">
    <span class="flex items-center gap-1"><i data-lucide="trophy" width="14" height="14"></i> LV <span id="footer-level">0</span></span>
    <span id="footer-missions">0 MISSIONS LOGGED</span>
  </footer>

  <script>
    // --- XP PROGRESSION DATA (0-50) ---
    const XP_TABLE = [
      12, 15, 18, 22, 26, 30, 36, 44, 54, 66, 80, // 0-10
      96, 114, 135, 160, 188, 220, 256, 296, 340, 390, // 11-20
      445, 505, 570, 640, 715, 795, 880, 970, 1065, 1165, // 21-30
      1270, 1380, 1495, 1615, 1740, 1870, 2005, 2145, 2290, 2440, // 31-40
      2595, 2755, 2920, 3090, 3265, 3445, 3630, 3820, 4015, 4215 // 41-50
    ];

    const getXpRequired = (level) => {
      if (level < XP_TABLE.length) return XP_TABLE[level];
      return XP_TABLE[XP_TABLE.length - 1] + (level - 50) * 200;
    };

    const getRewardBase = (level) => {
      if (level <= 5) return 6;
      if (level <= 10) return 7;
      if (level <= 15) return 9;
      if (level <= 20) return 12;
      if (level <= 30) return 16;
      if (level <= 40) return 20;
      return 25;
    };

    // --- STATE ---
    let state = {
      level: 0,
      xp: 0,
      activeTab: 'habits',
      isAddMenuOpen: false,
      lastCheckDate: new Date().toISOString().split('T')[0],
      habits: [
        { id: 1, text: 'Morning Meditation', streak: 5, lastCompleted: null },
        { id: 2, text: 'Drink 2L Water', streak: 2, lastCompleted: null }
      ],
      todos: [
        { id: 1, text: 'Finish project report', important: true, completed: false }
      ],
      showLevelUp: false
    };

    // Simple HTML escaper
    const escapeHTML = (str) => str.replace(/[&<>'"]/g, tag => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag] || tag));

    // --- DAILY RESET LOGIC ---
    function checkDailyReset() {
      const today = new Date().toISOString().split('T')[0];
      const savedDate = localStorage.getItem('last_productivity_date');

      if (savedDate && savedDate !== today) {
        state.todos = [];
        console.log("Midnight Reset: To-Do list cleared.");
        render();
      }
      
      state.lastCheckDate = today;
      localStorage.setItem('last_productivity_date', today);
    }

    // --- XP LOGIC ---
    function addXp(amount) {
      state.xp += amount;
      let xpRequired = getXpRequired(state.level);

      if (state.xp >= xpRequired) {
        state.xp -= xpRequired;
        state.level += 1;
        state.showLevelUp = true;
        
        setTimeout(() => {
          state.showLevelUp = false;
          render();
        }, 2000);
      }
      
      showFeedback(`+${amount} XP`);
      render();
    }

    function removeXp(amount) {
      state.xp = Math.max(0, state.xp - amount);
      render();
    }

    function showFeedback(text) {
      const container = document.getElementById('feedback-container');
      const el = document.createElement('div');
      el.className = 'fixed floating-xp text-yellow-400 font-bold text-3xl z-50 pointer-events-none drop-shadow-md';
      el.style.left = `${Math.random() * 40 + 30}%`;
      el.style.top = '15%';
      el.innerText = text;
      container.appendChild(el);
      
      setTimeout(() => el.remove(), 1000);
    }

    // --- ACTIONS ---
    function toggleHabit(id) {
      const today = new Date().toISOString().split('T')[0];
      state.habits = state.habits.map(h => {
        if (h.id === id) {
          if (h.lastCompleted === today) return h;
          const base = getRewardBase(state.level);
          const bonus = Math.round(h.streak * 0.5);
          addXp(base + bonus);
          return { ...h, streak: h.streak + 1, lastCompleted: today };
        }
        return h;
      });
      render();
    }

    function deleteHabit(id) {
      state.habits = state.habits.filter(h => h.id !== id);
      render();
    }

    function toggleTodo(id) {
      state.todos = state.todos.map(t => {
        if (t.id === id) {
          const base = getRewardBase(state.level);
          const reward = t.important ? Math.round(base * 1.5) : Math.round(base * 0.75);
          if (!t.completed) {
            addXp(reward);
          } else {
            removeXp(reward);
          }
          return { ...t, completed: !t.completed };
        }
        return t;
      });
      render();
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      render();
    }

    // --- FORMS ---
    function handleAddHabit(e) {
      e.preventDefault();
      const input = document.getElementById('habit-input');
      if (input.value) {
        state.habits.push({ id: Date.now(), text: input.value, streak: 0, lastCompleted: null });
        input.value = '';
        closeAddMenu();
      }
    }

    function handleAddTodo(e) {
      e.preventDefault();
      const input = document.getElementById('todo-input');
      const impCheckbox = document.getElementById('todo-important');
      if (input.value) {
        state.todos.push({ id: Date.now(), text: input.value, important: impCheckbox.checked, completed: false });
        input.value = '';
        impCheckbox.checked = false;
        closeAddMenu();
      }
    }

    function openAddMenu() {
      document.getElementById('add-menu-modal').classList.remove('hidden');
    }

    function closeAddMenu() {
      document.getElementById('add-menu-modal').classList.add('hidden');
      render();
    }

    function setTab(tabName) {
      state.activeTab = tabName;
      render();
    }

    // --- RENDER ENGINE ---
    function render() {
      // 1. Update Header Stats
      const levelEl = document.getElementById('level-display');
      levelEl.innerText = `LV. ${state.level}`;
      if (state.showLevelUp) {
        levelEl.className = 'text-4xl font-bold level-pulse text-purple-400';
        document.getElementById('level-up-container').innerHTML = `
          <div class="fixed top-1/4 left-1/2 -translate-x-1/2 text-6xl text-purple-400 font-bold level-pulse z-50 pointer-events-none drop-shadow-lg">
            LEVEL UP!
          </div>
        `;
      } else {
        levelEl.className = 'text-4xl font-bold text-white';
        document.getElementById('level-up-container').innerHTML = '';
      }

      const xpRequired = getXpRequired(state.level);
      const progressPercent = (state.xp / xpRequired) * 100;
      document.getElementById('xp-bar').style.width = `${progressPercent}%`;
      document.getElementById('base-xp-text').innerText = `Base: ${getRewardBase(state.level)} XP`;
      document.getElementById('xp-text').innerText = `${state.xp} / ${xpRequired} XP`;

      // 2. Manage Tabs
      const habitsSec = document.getElementById('habits-section');
      const todosSec = document.getElementById('todos-section');
      const navHabits = document.getElementById('nav-habits');
      const navTodos = document.getElementById('nav-todos');

      if (state.activeTab === 'habits') {
        habitsSec.classList.replace('hidden', 'block');
        todosSec.classList.replace('block', 'hidden');
        
        navHabits.className = 'flex flex-col items-center gap-1 transition-all flex-1 py-2 text-orange-400 scale-110 drop-shadow-[0_0_8px_rgba(251,146,60,0.5)]';
        navHabits.querySelector('i').setAttribute('fill', 'currentColor');
        
        navTodos.className = 'flex flex-col items-center gap-1 transition-all flex-1 py-2 text-gray-500';
        navTodos.querySelector('i').setAttribute('fill', 'none');
      } else {
        habitsSec.classList.replace('block', 'hidden');
        todosSec.classList.replace('hidden', 'block');

        navHabits.className = 'flex flex-col items-center gap-1 transition-all flex-1 py-2 text-gray-500';
        navHabits.querySelector('i').setAttribute('fill', 'none');

        navTodos.className = 'flex flex-col items-center gap-1 transition-all flex-1 py-2 text-blue-400 scale-110 drop-shadow-[0_0_8px_rgba(96,165,250,0.5)]';
        navTodos.querySelector('i').setAttribute('fill', 'currentColor'); // Note list-todo generally doesn't fill well by default but kept to match logic
      }

      // 3. Render Habits
      const habitsContainer = document.getElementById('habits-list');
      if (state.habits.length === 0) {
        habitsContainer.innerHTML = `<div class="glass-panel p-8 pixel-border text-center text-gray-400 italic">Add a habit via the menu above</div>`;
      } else {
        const today = new Date().toISOString().split('T')[0];
        habitsContainer.innerHTML = state.habits.map(habit => {
          const isDone = habit.lastCompleted === today;
          return `
            <div class="p-4 pixel-border flex items-center justify-between transition-all ${isDone ? 'bg-green-900/40 opacity-70 scale-95' : 'glass-panel hover:bg-[#2a2a2a]/90'}">
              <div class="flex flex-col">
                <span class="text-xl font-bold ${isDone ? 'line-through text-gray-500' : 'text-white'}">${escapeHTML(habit.text)}</span>
                <span class="text-orange-400 text-sm flex items-center gap-1 font-bold">
                  <i data-lucide="flame" width="14" height="14" fill="currentColor"></i> ${habit.streak} DAY STREAK
                </span>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="toggleHabit(${habit.id})" ${isDone ? 'disabled' : ''} class="p-2 pixel-border pixel-btn ${isDone ? 'bg-green-800 border-green-900 cursor-default' : 'bg-gray-700 hover:bg-gray-600'}">
                  ${isDone ? `<i data-lucide="check" width="28" height="28" class="text-green-400"></i>` : `<i data-lucide="plus" width="28" height="28"></i>`}
                </button>
                <button onclick="deleteHabit(${habit.id})" class="p-2 text-gray-500 hover:text-red-500 transition-colors">
                  <i data-lucide="trash-2" width="20" height="20"></i>
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      // 4. Render Todos
      const todosContainer = document.getElementById('todos-list');
      if (state.todos.length === 0) {
        todosContainer.innerHTML = `<div class="glass-panel p-8 pixel-border text-center text-gray-400 italic">All missions accomplished!</div>`;
      } else {
        todosContainer.innerHTML = state.todos.map(todo => `
          <div class="p-4 pixel-border flex items-center justify-between transition-all ${todo.completed ? 'bg-blue-900/40 opacity-70 scale-95' : 'glass-panel hover:bg-[#2a2a2a]/90'}">
            <div class="flex items-center gap-3">
              <button onclick="toggleTodo(${todo.id})" class="w-10 h-10 pixel-border flex items-center justify-center ${todo.completed ? 'bg-blue-600' : 'bg-gray-700'}">
                ${todo.completed ? `<i data-lucide="check" width="24" height="24"></i>` : ''}
              </button>
              <div class="flex flex-col">
                <span class="text-xl font-bold ${todo.completed ? 'line-through text-gray-500' : 'text-white'} ${todo.important ? 'text-yellow-400 underline decoration-yellow-600' : ''}">
                  ${escapeHTML(todo.text)}
                </span>
                ${todo.important ? `<span class="text-[12px] text-yellow-600 uppercase tracking-widest font-bold">CRITICAL PRIORITY</span>` : ''}
              </div>
            </div>
            <button onclick="deleteTodo(${todo.id})" class="p-2 text-gray-500 hover:text-red-500 transition-colors">
              <i data-lucide="trash-2" width="20" height="20"></i>
            </button>
          </div>
        `).join('');
      }

      // 5. Update Footer
      document.getElementById('footer-level').innerText = state.level;
      document.getElementById('footer-missions').innerText = `${state.habits.length + state.todos.length} MISSIONS LOGGED`;

      // 6. Re-initialize icons since DOM was re-rendered
      lucide.createIcons();
    }

    // --- INITIALIZATION ---
    checkDailyReset();
    setInterval(checkDailyReset, 60000); // Check for midnight every minute
    render(); // Initial render

  </script>
</body>
</html>
