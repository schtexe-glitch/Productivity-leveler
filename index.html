<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Journal</title>

    <!-- PWA Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .then(() => console.log("SW registered"))
                    .catch(err => console.log("SW error:", err));
            });
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-color: #495057;
            --border-color: #e9ecef;
            --shadow-color: rgba(149, 157, 165, 0.15);
            --accent-color: #ff8fa3; 
            --success-color: #6edb8f; 
            --muted-color: #adb5bd;
            --input-bg: #f8f9fa;
        }

        body.theme-dark {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #2c2c2c;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --accent-color: #ff6b6b;
            --success-color: #51cf66;
            --muted-color: #6c757d;
            --input-bg: #2b2b2b;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .soft-card {
            background-color: var(--surface-color);
            border-radius: 1rem;
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
        }
        
        .soft-input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            outline: none;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
        }

        .soft-btn {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            box-shadow: 0 2px 6px var(--shadow-color);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .soft-btn:active { transform: translateY(2px); }

        .soft-checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--muted-color);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--surface-color);
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .soft-checkbox.habit-check { border-radius: 50%; }
        .soft-checkbox:checked { background-color: var(--success-color); border-color: var(--success-color); }
        .soft-checkbox:checked::after {
            content: ''; width: 5px; height: 10px; border: solid white;
            border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px;
        }

        .page-container { display: none; animation: slideUp 0.4s ease forwards; }
        .page-container.active { display: flex; flex-direction: column; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .progress-bar-bg { background-color: var(--input-bg); height: 10px; border-radius: 6px; overflow: hidden; position: relative; }
        .progress-bar-fill { background-color: var(--success-color); height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-bar-fill.accent { background-color: var(--accent-color); }

        .modal-overlay { backdrop-filter: blur(4px); background-color: rgba(0,0,0,0.2); transition: all 0.3s ease; }
        body.theme-dark .modal-overlay { background-color: rgba(0,0,0,0.6); }

        .strike-through { text-decoration: line-through; color: var(--muted-color); }
    </style>
</head>
<body class="theme-dark h-screen w-screen flex flex-col overflow-hidden text-base">

    <!-- Header -->
    <header class="p-5 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <button id="btn-nav" class="soft-btn p-2 text-[color:var(--text-color)]">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 id="header-date" class="font-bold text-lg tracking-wide"></h1>
        </div>
        <button id="btn-theme" class="soft-btn p-2 text-[color:var(--text-color)]">
            <svg id="icon-sun" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </header>

    <!-- Navigation Overlay -->
    <div id="nav-menu" class="fixed inset-0 modal-overlay z-50 flex-col hidden justify-end">
        <div class="bg-[color:var(--surface-color)] rounded-t-3xl p-6 pb-10 shadow-xl border-t border-[color:var(--border-color)] transition-transform duration-300 transform translate-y-full" id="nav-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Navigation</h2>
                <button id="btn-close-nav" class="p-2 bg-[color:var(--input-bg)] rounded-full text-[color:var(--muted-color)]">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="space-y-3">
                <button onclick="switchView('today')" class="w-full text-left p-4 rounded-xl soft-input flex items-center gap-3 font-semibold">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    Daily Log
                </button>
                <button onclick="switchView('overview')" class="w-full text-left p-4 rounded-xl soft-input flex items-center gap-3 font-semibold">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Monthly Insights
                </button>
                <button onclick="switchView('history')" class="w-full text-left p-4 rounded-xl soft-input flex items-center gap-3 font-semibold">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Archive
                </button>
            </div>
            
            <div class="mt-8 pt-6 border-t border-[color:var(--border-color)]">
                <button id="btn-debug-skip" class="w-full text-left p-4 rounded-xl bg-[color:var(--accent-color)] bg-opacity-10 text-[color:var(--accent-color)] flex items-center gap-3 font-bold border border-[color:var(--accent-color)] border-opacity-20">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                    Debug: Skip Day
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto px-5 pb-24 relative">

        <!-- TODAY VIEW -->
        <div id="view-today" class="page-container active h-full space-y-8 pt-2">
            <section>
                <div class="flex justify-between items-end mb-4 px-1">
                    <h2 class="text-lg font-bold">Tasks</h2>
                </div>
                <div id="task-list" class="space-y-3"></div>
                <form id="form-task" class="flex gap-2 mt-4 relative">
                    <input type="text" id="input-task" placeholder="New task..." class="soft-input py-3 px-4 flex-1 text-sm shadow-sm" autocomplete="off">
                    <button type="submit" class="absolute right-2 top-1.5 bottom-1.5 bg-[color:var(--text-color)] text-[color:var(--bg-color)] rounded-lg px-3 flex items-center justify-center">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>
            </section>

            <section>
                <div class="flex justify-between items-center mb-4 px-1">
                    <h2 class="text-lg font-bold">Habits</h2>
                    <button onclick="openHabitManager()" class="text-xs bg-[color:var(--input-bg)] border border-[color:var(--border-color)] px-3 py-1.5 rounded-full text-[color:var(--muted-color)] font-bold">Manage</button>
                </div>
                <div id="habit-list" class="space-y-3"></div>
            </section>
        </div>

        <!-- OVERVIEW VIEW (Detailed Daily Percentage) -->
        <div id="view-overview" class="page-container h-full pt-2">
            <div class="flex justify-between items-baseline mb-6">
                <h2 class="text-xl font-bold">Monthly Overview</h2>
                <span id="overview-month-name" class="text-xs font-bold uppercase tracking-widest text-[color:var(--muted-color)]">Month</span>
            </div>
            
            <div id="stats-container" class="space-y-6">
                <!-- Month Progress -->
                <div class="soft-card p-4">
                    <div class="flex justify-between text-xs font-bold mb-2">
                        <span>Calendar Month Progress</span>
                        <span id="month-progress-val">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="month-progress-bar" class="progress-bar-fill accent"></div>
                    </div>
                </div>

                <!-- Daily Completion Rates -->
                <div class="soft-card p-5">
                    <h3 class="font-bold text-sm mb-4 flex items-center gap-2">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Daily Completion Rates
                    </h3>
                    <div id="daily-perc-list" class="space-y-4">
                        <!-- Daily progress rows injected here -->
                    </div>
                </div>

                <div id="overview-empty" class="hidden text-center text-[color:var(--muted-color)] p-10 font-bold bg-[color:var(--surface-color)] rounded-2xl border border-dashed border-[color:var(--border-color)]">
                    No logs found for this month yet.<br><span class="text-xs font-normal">Complete tasks to see your stats!</span>
                </div>
            </div>
        </div>

        <!-- HISTORY LIST -->
        <div id="view-history" class="page-container h-full pt-2">
            <h2 class="text-xl font-bold mb-6">Archives</h2>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <!-- HISTORY DETAIL -->
        <div id="view-history-detail" class="page-container h-full pt-2">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="switchView('history')" class="soft-btn p-2 rounded-full"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                <h2 id="history-detail-date" class="text-xl font-bold"></h2>
            </div>
            <div class="soft-card p-6 space-y-6">
                <div id="hist-missed-section">
                    <h3 class="text-xs font-bold uppercase text-[color:var(--accent-color)] mb-2">Missed</h3>
                    <ul id="hist-missed-list" class="space-y-2 text-sm opacity-80"></ul>
                </div>
                <div>
                    <h3 class="text-xs font-bold uppercase text-[color:var(--success-color)] mb-2">Completed</h3>
                    <ul id="hist-completed-list" class="space-y-2 text-sm opacity-80"></ul>
                </div>
                <div>
                    <h3 class="text-xs font-bold uppercase text-[color:var(--muted-color)] mb-2">Habits</h3>
                    <ul id="hist-habits-list" class="space-y-2 text-sm"></ul>
                </div>
            </div>
        </div>
    </main>

    <!-- Habit Manager Modal -->
    <div id="modal-manage-habits" class="fixed inset-0 modal-overlay z-50 flex flex-col justify-end hidden">
        <div class="bg-[color:var(--surface-color)] rounded-t-3xl p-6 pb-12 shadow-2xl border-t border-[color:var(--border-color)] h-[60vh] flex flex-col transition-transform duration-300 transform translate-y-full" id="habit-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Manage Habits</h2>
                <button onclick="closeHabitManager()" class="p-2 bg-[color:var(--input-bg)] rounded-full text-[color:var(--muted-color)]"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <form id="form-manage-habit" class="flex gap-2 mb-6 relative">
                <input type="text" id="input-manage-habit" placeholder="New habit..." class="soft-input py-3 px-4 flex-1 text-sm shadow-sm" autocomplete="off">
                <button type="submit" class="bg-[color:var(--success-color)] text-white rounded-lg px-4 font-bold">Add</button>
            </form>
            <div id="manage-habit-list" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'soft_journal_v4';
        let state = { theme: 'dark', lastOpenedDate: '', tasks: [], habits: [], habitStatus: {}, history: {} };

        function init() {
            loadState();
            applyTheme();
            checkAndResetDay();
            setupEvents();
            updateHeaderDate();
            renderToday();
        }

        function loadState() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) state = { ...state, ...JSON.parse(stored) };
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function getLocalDateString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function checkAndResetDay() {
            const todayStr = getLocalDateString();
            if (!state.lastOpenedDate) {
                state.lastOpenedDate = todayStr;
                saveState();
                return;
            }
            if (state.lastOpenedDate !== todayStr) {
                archiveDay();
                state.lastOpenedDate = todayStr;
                saveState();
            }
        }

        function archiveDay() {
            const entry = {
                completedTasks: state.tasks.filter(t => t.completed),
                missedTasks: state.tasks.filter(t => !t.completed),
                habits: state.habits.map(h => ({ id: h.id, text: h.text, completed: state.habitStatus[h.id] || false }))
            };
            if (entry.completedTasks.length > 0 || entry.missedTasks.length > 0 || entry.habits.length > 0) {
                state.history[state.lastOpenedDate] = entry;
            }
            state.tasks = []; 
            state.habitStatus = {}; 
        }

        function renderToday() {
            const tList = document.getElementById('task-list');
            tList.innerHTML = state.tasks.length ? '' : '<div class="text-center py-8 opacity-40 text-sm italic">Clean slate!</div>';
            state.tasks.forEach(t => {
                const div = document.createElement('div');
                div.className = 'soft-card p-4 flex items-center gap-4 animate-slide-up';
                div.innerHTML = `
                    <input type="checkbox" class="soft-checkbox" ${t.completed ? 'checked' : ''}>
                    <span class="flex-1 font-semibold ${t.completed ? 'strike-through opacity-50' : ''}">${t.text}</span>
                    <button class="opacity-30 hover:opacity-100"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                `;
                div.querySelector('input').onclick = () => { t.completed = !t.completed; saveState(); renderToday(); };
                div.querySelector('button').onclick = () => { state.tasks = state.tasks.filter(x => x.id !== t.id); saveState(); renderToday(); };
                tList.appendChild(div);
            });

            const hList = document.getElementById('habit-list');
            hList.innerHTML = '';
            state.habits.forEach(h => {
                const checked = state.habitStatus[h.id];
                const div = document.createElement('div');
                div.className = 'soft-card p-4 flex items-center gap-4 animate-slide-up';
                div.innerHTML = `
                    <input type="checkbox" class="soft-checkbox habit-check" ${checked ? 'checked' : ''}>
                    <span class="flex-1 font-semibold ${checked ? 'text-[color:var(--success-color)]' : ''}">${h.text}</span>
                `;
                div.querySelector('input').onclick = () => { state.habitStatus[h.id] = !checked; saveState(); renderToday(); };
                hList.appendChild(div);
            });
        }

        function renderOverview() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const currentMonthStr = `${year}-${String(month + 1).padStart(2, '0')}`;
            
            document.getElementById('overview-month-name').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const currentDay = now.getDate();
            const monthPerc = Math.round((currentDay / daysInMonth) * 100);
            document.getElementById('month-progress-val').textContent = monthPerc + '%';
            document.getElementById('month-progress-bar').style.width = monthPerc + '%';

            const monthEntries = Object.entries(state.history)
                .filter(([date]) => date.startsWith(currentMonthStr))
                .sort((a,b) => new Date(b[0]) - new Date(a[0]));
            
            const list = document.getElementById('daily-perc-list');
            list.innerHTML = '';

            if (monthEntries.length === 0) {
                document.getElementById('overview-empty').classList.remove('hidden');
                return;
            }
            document.getElementById('overview-empty').classList.add('hidden');

            monthEntries.forEach(([date, data]) => {
                const completed = data.completedTasks?.length || 0;
                const missed = data.missedTasks?.length || 0;
                const total = completed + missed;
                const perc = total === 0 ? 0 : Math.round((completed / total) * 100);
                
                const dateObj = new Date(date + 'T00:00:00');
                const label = dateObj.toLocaleDateString('en-US', { day: 'numeric', weekday: 'short' });

                const item = document.createElement('div');
                item.className = 'space-y-1';
                item.innerHTML = `
                    <div class="flex justify-between items-baseline text-xs font-bold">
                        <span class="opacity-60">${label}</span>
                        <div class="flex items-center gap-2">
                            <span class="${perc === 100 ? 'text-[color:var(--success-color)]' : ''}">${perc}%</span>
                            <span class="text-[9px] opacity-40 font-normal">(${completed}/${total} tasks)</span>
                        </div>
                    </div>
                    <div class="progress-bar-bg h-2">
                        <div class="progress-bar-fill" style="width: ${perc}%"></div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function switchView(viewId) {
            document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active'));
            const header = document.getElementById('header-date');
            
            if (viewId === 'today') {
                header.textContent = formatDateStr(state.lastOpenedDate);
                document.getElementById('view-today').classList.add('active');
            } else if (viewId === 'overview') {
                header.textContent = 'Insights';
                renderOverview();
                document.getElementById('view-overview').classList.add('active');
            } else if (viewId === 'history') {
                header.textContent = 'Archives';
                renderHistoryList();
                document.getElementById('view-history').classList.add('active');
            }
            closeNav();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const dates = Object.keys(state.history).sort((a,b) => new Date(b) - new Date(a));
            dates.forEach(d => {
                const div = document.createElement('button');
                div.className = 'w-full soft-card p-4 text-left flex justify-between items-center';
                div.innerHTML = `<span>${formatDateStr(d)}</span> <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
                div.onclick = () => renderHistoryDetail(d);
                list.appendChild(div);
            });
        }

        function renderHistoryDetail(date) {
            const data = state.history[date];
            document.getElementById('history-detail-date').textContent = formatDateStr(date);
            const mList = document.getElementById('hist-missed-list');
            mList.innerHTML = data.missedTasks.length ? '' : 'None! 🎉';
            data.missedTasks.forEach(t => mList.innerHTML += `<li>• ${t.text}</li>`);
            
            const cList = document.getElementById('hist-completed-list');
            cList.innerHTML = '';
            data.completedTasks.forEach(t => cList.innerHTML += `<li>• ${t.text}</li>`);

            const hList = document.getElementById('hist-habits-list');
            hList.innerHTML = '';
            data.habits.forEach(h => hList.innerHTML += `<li class="${h.completed ? 'text-[color:var(--success-color)] font-bold' : 'opacity-40'}">${h.completed ? '✓' : '○'} ${h.text}</li>`);
            
            document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active'));
            document.getElementById('view-history-detail').classList.add('active');
        }

        function formatDateStr(s) {
            if (!s) return '';
            const d = new Date(s + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function setupEvents() {
            document.getElementById('form-task').onsubmit = (e) => {
                e.preventDefault();
                const val = document.getElementById('input-task').value.trim();
                if (val) { state.tasks.push({ id: Date.now(), text: val, completed: false }); saveState(); renderToday(); }
                document.getElementById('input-task').value = '';
            };
            document.getElementById('form-manage-habit').onsubmit = (e) => {
                e.preventDefault();
                const val = document.getElementById('input-manage-habit').value.trim();
                if (val) { state.habits.push({ id: Date.now(), text: val }); saveState(); renderHabitManager(); renderToday(); }
                document.getElementById('input-manage-habit').value = '';
            };
            document.getElementById('btn-nav').onclick = () => {
                const nav = document.getElementById('nav-menu');
                nav.classList.remove('hidden'); nav.classList.add('flex');
                setTimeout(() => document.getElementById('nav-content').classList.remove('translate-y-full'), 10);
            };
            document.getElementById('btn-close-nav').onclick = closeNav;
            document.getElementById('btn-theme').onclick = () => { state.theme = state.theme === 'dark' ? 'light' : 'dark'; applyTheme(); saveState(); };
            document.getElementById('btn-debug-skip').onclick = () => {
                archiveDay();
                const d = new Date(state.lastOpenedDate + 'T00:00:00');
                d.setDate(d.getDate() + 1);
                state.lastOpenedDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                saveState(); switchView('today');
            };
        }

        function closeNav() {
            document.getElementById('nav-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('nav-menu').classList.add('hidden'), 300);
        }

        function openHabitManager() {
            renderHabitManager();
            document.getElementById('modal-manage-habits').classList.remove('hidden');
            setTimeout(() => document.getElementById('habit-content').classList.remove('translate-y-full'), 10);
        }

        function closeHabitManager() {
            document.getElementById('habit-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal-manage-habits').classList.add('hidden'), 300);
        }

        function renderHabitManager() {
            const list = document.getElementById('manage-habit-list');
            list.innerHTML = '';
            state.habits.forEach(h => {
                const div = document.createElement('div');
                div.className = 'soft-input p-3 flex justify-between items-center font-bold';
                div.innerHTML = `<span>${h.text}</span> <button class="text-[color:var(--accent-color)]">Del</button>`;
                div.querySelector('button').onclick = () => { state.habits = state.habits.filter(x => x.id !== h.id); saveState(); renderHabitManager(); renderToday(); };
                list.appendChild(div);
            });
        }

        function applyTheme() {
            document.body.className = state.theme === 'dark' ? 'theme-dark' : 'theme-light';
            document.getElementById('icon-sun').classList.toggle('hidden', state.theme !== 'dark');
            document.getElementById('icon-moon').classList.toggle('hidden', state.theme === 'dark');
        }

        function updateHeaderDate() { document.getElementById('header-date').textContent = formatDateStr(state.lastOpenedDate); }

        window.onload = init;
    </script>
</body>
</html>
