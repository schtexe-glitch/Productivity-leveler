<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Journal</title>

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .then(() => console.log("SW registered"))
                    .catch(err => console.log("SW error:", err));
            });
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcfcfc;
            --surface-color: #ffffff;
            --text-color: #1a1a1a;
            --border-color: #eeeeee;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --accent-color: #c8ff57; 
            --success-color: #c8ff57; 
            --muted-color: #888888;
            --input-bg: #f5f5f5;
            --heading-font: 'DM Serif Display', serif;
            --body-font: 'Inter', sans-serif;
        }

        body.theme-dark {
            --bg-color: #0a0a0a;
            --surface-color: #141414;
            --text-color: #efefef;
            --border-color: #222222;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --accent-color: #c8ff57;
            --success-color: #c8ff57;
            --muted-color: #666666;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: var(--body-font);
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
        }

        h1, h2, h3, .editorial-font {
            font-family: var(--heading-font);
        }

        .soft-card {
            background-color: var(--surface-color);
            border-radius: 0.5rem;
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
        }
        
        .soft-input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            outline: none;
            border-radius: 0.4rem;
            transition: all 0.2s ease;
        }

        .soft-btn {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.4rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .soft-btn:active { transform: scale(0.96); }

        .soft-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--border-color);
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--input-bg);
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .soft-checkbox.habit-check { border-radius: 50%; }
        .soft-checkbox:checked { background-color: var(--accent-color); border-color: var(--accent-color); }
        .soft-checkbox:checked::after {
            content: ''; width: 5px; height: 9px; border: solid #000;
            border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); margin-bottom: 2px;
        }

        .page-container { display: none; animation: fadeIn 0.4s ease forwards; }
        .page-container.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-overlay { backdrop-filter: blur(8px); background-color: rgba(0,0,0,0.4); transition: all 0.3s ease; }

        .strike-through { text-decoration: line-through; color: var(--muted-color); font-style: italic; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0.5rem calc(0.75rem + env(safe-area-inset-bottom));
            z-index: 40;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--muted-color);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: color 0.2s ease;
            flex: 1;
        }

        .nav-item.active { color: var(--text-color); }
        .nav-item.active svg { color: var(--accent-color); }

        .stat-badge {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        /* TIGHTER HEATMAP GRID */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 4px;
            width: fit-content;
        }
        .habit-heatmap-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 3px;
            width: fit-content;
        }
        .heatmap-cell {
            aspect-ratio: 1;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            background-color: var(--border-color);
            transition: background-color 0.2s ease;
        }
        .heatmap-cell.completed { background-color: var(--accent-color); }
        .heatmap-cell[data-level="1"] { background-color: rgba(200, 255, 87, 0.2); }
        .heatmap-cell[data-level="2"] { background-color: rgba(200, 255, 87, 0.5); }
        .heatmap-cell[data-level="3"] { background-color: var(--accent-color); }

        /* COMPACT CARDS FOR STATS */
        .stat-habit-card {
            background-color: var(--surface-color);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            padding: 0.6rem;
        }

        #textarea-notes {
            line-height: 1.8;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="theme-dark">

    <header class="p-6 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <button id="btn-nav" class="soft-btn p-2 text-[color:var(--text-color)]" aria-label="Menu">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 id="header-date" class="text-xl"></h1>
        </div>
        <button id="btn-theme" class="soft-btn p-2 text-[color:var(--text-color)]" aria-label="Toggle Theme">
            <svg id="icon-sun" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </header>

    <!-- Sidebar / Drawer Menu -->
    <div id="nav-menu" class="fixed inset-0 modal-overlay z-50 flex-col hidden justify-end">
        <div class="bg-[color:var(--surface-color)] rounded-t-3xl p-6 pb-12 shadow-xl border-t border-[color:var(--border-color)] transition-transform duration-300 transform translate-y-full" id="nav-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl">Menu</h2>
                <button id="btn-close-nav" class="p-2 bg-[color:var(--input-bg)] rounded-full text-[color:var(--muted-color)]">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="mb-8 p-5 soft-input rounded-xl flex flex-col items-center">
                <div class="flex justify-between items-center w-full mb-4">
                    <span class="text-[0.65rem] uppercase font-bold tracking-widest opacity-40">Activity History</span>
                </div>
                <div id="nav-heatmap" class="heatmap-grid"></div>
            </div>

            <div class="space-y-3">
                <button onclick="switchView('today')" class="w-full text-left p-4 rounded-xl soft-input flex items-center gap-4 font-semibold text-sm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    Daily Entry
                </button>
                <button onclick="switchView('history')" class="w-full text-left p-4 rounded-xl soft-input flex items-center gap-4 font-semibold text-sm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Archives
                </button>
                <button onclick="switchView('stats')" class="w-full text-left p-4 rounded-xl soft-input flex items-center gap-4 font-semibold text-sm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Insights
                </button>
            </div>
            <div class="mt-8 pt-6 border-t border-[color:var(--border-color)]">
                <button id="btn-debug-skip" class="w-full text-left p-4 rounded-xl bg-[color:var(--accent-color)] bg-opacity-10 text-[color:var(--text-color)] flex items-center gap-4 font-bold border border-[color:var(--accent-color)] border-opacity-30 text-xs">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                    Archive Day Manually
                </button>
            </div>
        </div>
    </div>

    <main class="px-6 pb-32 relative">
        <!-- Daily View -->
        <div id="view-today" class="page-container active space-y-8 pt-2">
            <section id="section-tasks" class="space-y-4">
                <div class="flex justify-between items-end mb-2 px-1">
                    <h2 class="text-2xl">Tasks</h2>
                </div>
                <form id="form-task" class="flex gap-2 mb-4 relative">
                    <input type="text" id="input-task" placeholder="Type a new task..." class="soft-input py-3 px-4 flex-1 text-sm" autocomplete="off" enterkeyhint="done">
                    <button type="submit" class="absolute right-2 top-2 bottom-2 bg-[color:var(--accent-color)] text-black rounded px-3 flex items-center justify-center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>
                <div id="task-list" class="space-y-3"></div>
            </section>

            <section id="section-habits" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-2 px-1">
                    <h2 class="text-2xl">Habits</h2>
                    <button onclick="openHabitManager()" class="text-[0.6rem] font-black uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity">Edit</button>
                </div>
                <div id="habit-list" class="space-y-3"></div>
            </section>

            <section id="section-notes" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-2 px-1 shrink-0">
                    <h2 class="text-2xl text-[color:var(--accent-color)]">Reflections</h2>
                </div>
                <textarea id="textarea-notes" placeholder="Write your thoughts for today..." class="soft-input p-6 w-full shadow-sm min-h-[400px] resize-none border-none bg-[color:var(--surface-color)]" spellcheck="false"></textarea>
            </section>
        </div>

        <!-- History List View -->
        <div id="view-history" class="page-container pt-2">
            <h2 class="text-2xl mb-6">Archives</h2>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- Stats View -->
        <div id="view-stats" class="page-container pt-2">
            <h2 class="text-2xl mb-6">Insights</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="stat-badge">
                    <span class="text-[0.6rem] uppercase font-bold opacity-40 mb-2 block tracking-widest">Lifetime</span>
                    <span id="stat-total-habits" class="text-4xl editorial-font">0</span>
                    <span class="text-[0.6rem] opacity-40 block mt-1">Actions</span>
                </div>
                <div class="stat-badge">
                    <span class="text-[0.6rem] uppercase font-bold opacity-40 mb-2 block tracking-widest">Streak</span>
                    <span id="stat-streak" class="text-4xl editorial-font text-[color:var(--accent-color)]">0</span>
                    <span class="text-[0.6rem] opacity-40 block mt-1">Days</span>
                </div>
            </div>

            <div id="stats-habit-grids" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            
            <div class="soft-card p-6 mt-6 mb-6">
                <h3 class="text-[0.65rem] font-bold uppercase opacity-30 mb-3 tracking-widest">Most Active Day</h3>
                <div id="stat-best-day-card" class="flex flex-col gap-1">
                    <div id="stat-best-date" class="text-lg editorial-font">No records yet</div>
                    <div id="stat-best-details" class="text-xs opacity-50">Consistency is the key to clarity.</div>
                </div>
            </div>
        </div>

        <!-- Detail View -->
        <div id="view-history-detail" class="page-container pt-2">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="switchView('history')" class="soft-btn p-2 rounded-full"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                <h2 id="history-detail-date" class="text-2xl"></h2>
            </div>
            <div class="soft-card p-6 space-y-6">
                <div id="hist-missed-section">
                    <h3 class="text-[0.65rem] font-bold uppercase text-[color:var(--muted-color)] mb-3 tracking-widest">Unfinished</h3>
                    <ul id="hist-missed-list" class="space-y-2 text-sm opacity-80"></ul>
                </div>
                <div>
                    <h3 class="text-[0.65rem] font-bold uppercase text-[color:var(--accent-color)] mb-3 tracking-widest">Completed</h3>
                    <ul id="hist-completed-list" class="space-y-2 text-sm"></ul>
                </div>
                <div>
                    <h3 class="text-[0.65rem] font-bold uppercase opacity-30 mb-3 tracking-widest">Habit Recap</h3>
                    <ul id="hist-habits-list" class="space-y-2 text-sm"></ul>
                </div>
                <div id="hist-notes-section">
                    <h3 class="text-[0.65rem] font-bold uppercase opacity-30 mb-3 tracking-widest">Reflections</h3>
                    <div id="hist-notes-content" class="text-sm italic leading-relaxed whitespace-pre-wrap opacity-80 border-l border-[color:var(--border-color)] pl-5"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav id="bottom-tabs" class="bottom-nav">
        <button onclick="switchTab('tasks')" class="nav-item active" id="tab-tasks">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            <span>TASKS</span>
        </button>
        <button onclick="switchTab('habits')" class="nav-item" id="tab-habits">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            <span>HABITS</span>
        </button>
        <button onclick="switchTab('notes')" class="nav-item" id="tab-notes">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121(3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            <span>NOTES</span>
        </button>
    </nav>

    <!-- Modals -->
    <div id="modal-manage-habits" class="fixed inset-0 modal-overlay z-50 flex flex-col justify-end hidden">
        <div class="bg-[color:var(--surface-color)] rounded-t-3xl p-6 pb-12 shadow-2xl border-t border-[color:var(--border-color)] h-[60vh] flex flex-col transition-transform duration-300 transform translate-y-full" id="habit-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl">Edit Habits</h2>
                <button onclick="closeHabitManager()" class="p-2 bg-[color:var(--input-bg)] rounded-full text-[color:var(--muted-color)]"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <form id="form-manage-habit" class="flex gap-2 mb-6 relative">
                <input type="text" id="input-manage-habit" placeholder="Add a ritual..." class="soft-input py-3 px-4 flex-1 text-sm" autocomplete="off" enterkeyhint="done">
                <button type="submit" class="bg-[color:var(--accent-color)] text-black rounded px-4 text-xs font-bold uppercase tracking-widest">Add</button>
            </form>
            <div id="manage-habit-list" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'editorial_journal_v1';
        let state = { theme: 'dark', lastOpenedDate: '', tasks: [], habits: [], habitStatus: {}, notes: '', history: {} };
        let currentTab = 'tasks';

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSoftSound(type = 'click') {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'pop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'tick') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.04);
                gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
                osc.start(now); osc.stop(now + 0.04);
            } else {
                osc.type = 'sine'; osc.frequency.setValueAtTime(120, now); gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            }
        }

        function init() {
            loadState();
            applyTheme();
            checkAndResetDay();
            setupEvents();
            updateHeaderDate();
            renderToday();
            switchTab('tasks');
            document.getElementById('textarea-notes').value = state.notes || '';
            setInterval(checkAndResetDay, 60000);
        }

        function loadState() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) state = { ...state, ...JSON.parse(stored) };
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function getLocalDateString(dateObj = new Date()) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        function checkAndResetDay() {
            const todayStr = getLocalDateString();
            if (!state.lastOpenedDate) {
                state.lastOpenedDate = todayStr;
                saveState();
                return;
            }
            if (state.lastOpenedDate !== todayStr) {
                archiveDay();
                state.lastOpenedDate = todayStr;
                saveState();
                updateHeaderDate();
                renderToday();
                document.getElementById('textarea-notes').value = '';
            }
        }

        function archiveDay() {
            const entry = {
                completedTasks: state.tasks.filter(t => t.completed),
                missedTasks: state.tasks.filter(t => !t.completed),
                habits: state.habits.map(h => ({ 
                    id: h.id, 
                    text: h.text, 
                    completed: state.habitStatus[h.id] || false 
                })),
                notes: state.notes || ''
            };
            const hasContent = entry.completedTasks.length > 0 || 
                             entry.missedTasks.length > 0 || 
                             entry.habits.length > 0 || 
                             entry.notes.trim().length > 0;

            if (hasContent) {
                state.history[state.lastOpenedDate] = entry;
            }
            state.tasks = []; 
            state.habitStatus = {}; 
            state.notes = ''; 
        }

        function renderToday() {
            const tList = document.getElementById('task-list');
            tList.innerHTML = state.tasks.length ? '' : '<div class="text-center py-12 opacity-30 text-xs tracking-widest uppercase">Start your journal</div>';
            state.tasks.forEach(t => {
                const div = document.createElement('div');
                div.className = 'soft-card p-4 flex items-center gap-4 border-none';
                div.innerHTML = `
                    <input type="checkbox" class="soft-checkbox" ${t.completed ? 'checked' : ''}>
                    <span class="flex-1 font-medium text-sm ${t.completed ? 'strike-through opacity-40' : ''}">${t.text}</span>
                    <button class="opacity-20 hover:opacity-100 p-1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
                `;
                div.querySelector('input').onclick = () => { 
                    t.completed = !t.completed; 
                    if(t.completed) playSoftSound('pop'); else playSoftSound('tick');
                    saveState(); renderToday(); 
                };
                div.querySelector('button').onclick = () => { 
                    playSoftSound('tick');
                    state.tasks = state.tasks.filter(x => x.id !== t.id); 
                    saveState(); renderToday(); 
                };
                tList.appendChild(div);
            });

            const hList = document.getElementById('habit-list');
            hList.innerHTML = state.habits.length ? '' : '<div class="text-center py-12 opacity-30 text-xs tracking-widest uppercase">Define your rituals</div>';
            state.habits.forEach(h => {
                const checked = state.habitStatus[h.id];
                const div = document.createElement('div');
                div.className = 'soft-card p-4 flex items-center gap-4 border-none';
                div.innerHTML = `
                    <input type="checkbox" class="soft-checkbox habit-check" ${checked ? 'checked' : ''}>
                    <span class="flex-1 font-medium text-sm ${checked ? 'opacity-40' : ''}">${h.text}</span>
                `;
                div.querySelector('input').onclick = () => { 
                    state.habitStatus[h.id] = !checked; 
                    if(!checked) playSoftSound('pop'); else playSoftSound('tick');
                    saveState(); renderToday(); 
                };
                hList.appendChild(div);
            });
        }

        function calculateStats() {
            let totalHabitsDone = 0;
            let bestDay = null;
            let maxCompleted = -1;
            const dates = Object.keys(state.history).sort((a,b) => new Date(a) - new Date(b));
            dates.forEach(date => {
                const entry = state.history[date];
                const habitsDone = entry.habits.filter(h => h.completed).length;
                totalHabitsDone += habitsDone;
                const completedCount = entry.completedTasks.length + habitsDone;
                if (completedCount >= maxCompleted) {
                    maxCompleted = completedCount;
                    bestDay = { date, count: completedCount, habits: habitsDone, tasks: entry.completedTasks.length };
                }
            });
            let streak = 0;
            const todayStr = getLocalDateString();
            let checkDate = new Date();
            while (true) {
                const dateStr = getLocalDateString(checkDate);
                const isToday = dateStr === todayStr;
                const entry = state.history[dateStr];
                const hasActivityToday = isToday && (state.tasks.some(t => t.completed) || Object.values(state.habitStatus).some(v => v));
                
                if (entry || hasActivityToday) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else { break; }
            }
            document.getElementById('stat-total-habits').textContent = totalHabitsDone;
            document.getElementById('stat-streak').textContent = streak;
            if (bestDay) {
                document.getElementById('stat-best-date').textContent = formatDateStr(bestDay.date);
                document.getElementById('stat-best-details').textContent = `${bestDay.tasks} tasks & ${bestDay.habits} habits.`;
            }
            renderHabitStats();
        }

        function renderHabitStats() {
            const container = document.getElementById('stats-habit-grids');
            container.innerHTML = '';
            if (state.habits.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-10 opacity-30 text-xs tracking-widest">NO DATA TO SHOW</div>';
                return;
            }
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthName = now.toLocaleString('default', { month: 'short' }).toUpperCase();
            const todayStr = getLocalDateString();

            state.habits.forEach(habit => {
                const card = document.createElement('div');
                card.className = 'stat-habit-card flex flex-col items-center border-none shadow-md';
                let completedThisMonth = 0;
                let cellsHtml = '';

                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    const isToday = dateStr === todayStr;
                    let isCompleted = false;

                    if (isToday) {
                        isCompleted = state.habitStatus[habit.id] || false;
                    } else if (state.history[dateStr]) {
                        const histHabit = state.history[dateStr].habits.find(h => h.id === habit.id);
                        isCompleted = histHabit ? histHabit.completed : false;
                    }

                    if (isCompleted) completedThisMonth++;
                    cellsHtml += `<div class="heatmap-cell ${isCompleted ? 'completed' : ''}" title="${dateStr}"></div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center w-full mb-3">
                        <h4 class="font-bold text-[0.7rem] truncate mr-2 tracking-tight">${habit.text}</h4>
                        <div class="text-[0.5rem] font-black opacity-30 tracking-widest shrink-0">
                            ${completedThisMonth}D
                        </div>
                    </div>
                    <div class="habit-heatmap-grid mb-2">${cellsHtml}</div>
                    <div class="w-full text-left text-[0.5rem] opacity-20 tracking-tighter">${monthName} ${year}</div>
                `;
                container.appendChild(card);
            });
        }

        function renderHeatmap() {
            const container = document.getElementById('nav-heatmap');
            container.innerHTML = '';
            const daysToShow = 75; 
            const today = new Date();
            for (let i = daysToShow - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(today.getDate() - i);
                const dateStr = getLocalDateString(d);
                const cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                const histEntry = state.history[dateStr];
                const isToday = dateStr === getLocalDateString();
                let completionCount = 0;
                if (histEntry) {
                    completionCount = histEntry.habits.filter(h => h.completed).length + histEntry.completedTasks.length;
                } else if (isToday) {
                    completionCount = Object.values(state.habitStatus).filter(v => v).length + state.tasks.filter(t => t.completed).length;
                }
                if (completionCount > 0) {
                    if (completionCount >= 5) cell.setAttribute('data-level', '3');
                    else if (completionCount >= 3) cell.setAttribute('data-level', '2');
                    else cell.setAttribute('data-level', '1');
                }
                cell.title = `${formatDateStr(dateStr)}: ${completionCount} items`;
                container.appendChild(cell);
            }
        }

        function switchView(viewId) {
            playSoftSound('click');
            document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active'));
            const header = document.getElementById('header-date');
            const bottomNav = document.getElementById('bottom-tabs');
            if (viewId === 'today') {
                header.textContent = formatDateStr(state.lastOpenedDate);
                document.getElementById('view-today').classList.add('active');
                bottomNav.classList.remove('hidden');
            } else if (viewId === 'history') {
                header.textContent = 'Archives';
                renderHistoryList();
                document.getElementById('view-history').classList.add('active');
                bottomNav.classList.add('hidden');
            } else if (viewId === 'stats') {
                header.textContent = 'Insights';
                calculateStats();
                document.getElementById('view-stats').classList.add('active');
                bottomNav.classList.add('hidden');
            } else if (viewId === 'history-detail') {
                document.getElementById('view-history-detail').classList.add('active');
                bottomNav.classList.add('hidden');
            }
            closeNav();
            window.scrollTo(0, 0);
        }

        function switchTab(tabId) {
            playSoftSound('tick');
            currentTab = tabId;
            document.getElementById('section-tasks').classList.toggle('hidden', tabId !== 'tasks');
            document.getElementById('section-habits').classList.toggle('hidden', tabId !== 'habits');
            document.getElementById('section-notes').classList.toggle('hidden', tabId !== 'notes');
            document.getElementById('tab-tasks').classList.toggle('active', tabId === 'tasks');
            document.getElementById('tab-habits').classList.toggle('active', tabId === 'habits');
            document.getElementById('tab-notes').classList.toggle('active', tabId === 'notes');
            window.scrollTo(0, 0);
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const dates = Object.keys(state.history).sort((a,b) => new Date(b) - new Date(a));
            if (!dates.length) {
                list.innerHTML = '<div class="text-center py-20 opacity-20 text-xs uppercase tracking-widest">No entries found</div>';
                return;
            }
            dates.forEach(d => {
                const div = document.createElement('button');
                div.className = 'w-full soft-card p-4 text-left flex justify-between items-center text-sm border-none shadow-sm';
                div.innerHTML = `<span class="font-medium">${formatDateStr(d)}</span> <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
                div.onclick = () => { playSoftSound('click'); renderHistoryDetail(d); };
                list.appendChild(div);
            });
        }

        function renderHistoryDetail(date) {
            const data = state.history[date];
            document.getElementById('history-detail-date').textContent = formatDateStr(date);
            const mList = document.getElementById('hist-missed-list');
            mList.innerHTML = data.missedTasks.length ? '' : 'No pending tasks.';
            data.missedTasks.forEach(t => mList.innerHTML += `<li>— ${t.text}</li>`);
            const cList = document.getElementById('hist-completed-list');
            cList.innerHTML = '';
            data.completedTasks.forEach(t => cList.innerHTML += `<li>— ${t.text}</li>`);
            const hList = document.getElementById('hist-habits-list');
            hList.innerHTML = '';
            data.habits.forEach(h => hList.innerHTML += `<li class="${h.completed ? 'opacity-100 font-bold' : 'opacity-20'}">${h.completed ? '●' : '○'} ${h.text}</li>`);
            const nContent = document.getElementById('hist-notes-content');
            const nSection = document.getElementById('hist-notes-section');
            if (data.notes && data.notes.trim()) {
                nSection.classList.remove('hidden'); nContent.textContent = data.notes;
            } else { nSection.classList.add('hidden'); }
            switchView('history-detail');
        }

        function formatDateStr(s) {
            if (!s) return '';
            const parts = s.split('-');
            const d = new Date(parts[0], parts[1]-1, parts[2]);
            return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function setupEvents() {
            document.getElementById('form-task').onsubmit = (e) => {
                e.preventDefault();
                const val = document.getElementById('input-task').value.trim();
                if (val) { 
                    playSoftSound('pop');
                    state.tasks.push({ id: Date.now(), text: val, completed: false }); 
                    saveState(); renderToday(); 
                }
                document.getElementById('input-task').value = '';
            };
            document.getElementById('form-manage-habit').onsubmit = (e) => {
                e.preventDefault();
                const val = document.getElementById('input-manage-habit').value.trim();
                if (val) { 
                    playSoftSound('pop');
                    state.habits.push({ id: Date.now(), text: val }); 
                    saveState(); renderHabitManager(); renderToday(); 
                }
                document.getElementById('input-manage-habit').value = '';
            };
            document.getElementById('textarea-notes').oninput = (e) => { state.notes = e.target.value; saveState(); };
            document.getElementById('btn-nav').onclick = () => {
                playSoftSound('click');
                renderHeatmap(); 
                const nav = document.getElementById('nav-menu');
                nav.classList.remove('hidden'); nav.classList.add('flex');
                setTimeout(() => document.getElementById('nav-content').classList.remove('translate-y-full'), 10);
            };
            document.getElementById('btn-close-nav').onclick = () => { playSoftSound('tick'); closeNav(); };
            document.getElementById('btn-theme').onclick = () => { 
                playSoftSound('tick');
                state.theme = state.theme === 'dark' ? 'light' : 'dark'; 
                applyTheme(); saveState(); 
            };
            document.getElementById('btn-debug-skip').onclick = () => {
                playSoftSound('pop'); archiveDay();
                const parts = state.lastOpenedDate.split('-');
                const d = new Date(parts[0], parts[1]-1, parts[2]);
                d.setDate(d.getDate() + 1);
                state.lastOpenedDate = getLocalDateString(d);
                saveState(); updateHeaderDate(); renderToday();
                document.getElementById('textarea-notes').value = '';
                closeNav(); switchView('today');
            };
        }

        function closeNav() {
            document.getElementById('nav-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('nav-menu').classList.add('hidden'), 300);
        }

        function openHabitManager() {
            playSoftSound('click'); renderHabitManager();
            document.getElementById('modal-manage-habits').classList.remove('hidden');
            setTimeout(() => document.getElementById('habit-content').classList.remove('translate-y-full'), 10);
        }

        function closeHabitManager() {
            playSoftSound('tick');
            document.getElementById('habit-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal-manage-habits').classList.add('hidden'), 300);
        }

        function renderHabitManager() {
            const list = document.getElementById('manage-habit-list');
            list.innerHTML = '';
            state.habits.forEach(h => {
                const div = document.createElement('div');
                div.className = 'soft-input p-3 flex justify-between items-center text-sm font-medium';
                div.innerHTML = `<span>${h.text}</span> <button class="text-[color:var(--accent-color)] opacity-60 font-bold p-1 uppercase text-[0.6rem] tracking-widest">Delete</button>`;
                div.querySelector('button').onclick = () => { 
                    playSoftSound('tick');
                    state.habits = state.habits.filter(x => x.id !== h.id); 
                    saveState(); renderHabitManager(); renderToday(); 
                };
                list.appendChild(div);
            });
        }

        function applyTheme() {
            document.body.className = state.theme === 'dark' ? 'theme-dark' : 'theme-light';
            document.getElementById('icon-sun').classList.toggle('hidden', state.theme !== 'dark');
            document.getElementById('icon-moon').classList.toggle('hidden', state.theme === 'dark');
        }

        function updateHeaderDate() { document.getElementById('header-date').textContent = formatDateStr(state.lastOpenedDate); }

        window.onload = init;
    </script>
</body>
</html>
